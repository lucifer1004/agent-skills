description = "Implement normalized runtime outcome handling, artifact/report consumption semantics, and deterministic-only reevaluation CLI in agent-skill-bench so failed attempts and reevaluated runs become first-class governed behavior."
notes = ["Deterministic reevaluation intentionally consumes saved candidate output only and never re-runs candidate or judge runtimes; reporting treats runtime outcomes as distinct from deterministic failure modes."]

