description = "Add artifact diff and regression comparison to agent-skill-bench so users can compare two benchmark artifact sets and see pass-rate, runtime-outcome, and failure-mode deltas without external scripts."
notes = ["Artifact comparison matches runs by suite/case identity only; duplicate identities are rejected explicitly and unmatched runs are reported separately rather than being dropped."]

