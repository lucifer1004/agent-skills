[content]
description = "Add reusable governance verification guards for the root repository so `agent-skill-bench` governance and test checks run through `govctl verify`, and wire CI to execute the same guard set. This closes the initial governance loop by making the accepted ADR/RFC baseline enforceable in both local and CI workflows."

[[content.journal]]
date = "2026-04-07"
scope = "governance"
content = """
Created reusable verification guards for `govctl check` and `agent-skill-bench` tests, enabled them as project defaults in `gov/config.toml`, and added a GitHub Actions workflow that runs `govctl verify`.

Validation:
- `govctl check`
- `govctl verify`
- `pixi run python -m pytest agent-skill-bench/tests -q`"""

